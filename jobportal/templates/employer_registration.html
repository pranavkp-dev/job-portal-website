{% load static %} 

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   


<style>
    body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: #f4f6f9;
}

/* Center container */
.form-container {
    width: 100%;
    max-width: 700px;
    margin: 40px auto;
    background: #ffffff;
    padding: 30px 40px;
    border-radius: 10px;
    box-shadow: 0 5px 18px rgba(0, 0, 0, 0.08);
}

/* Heading */
.employer-form h2 {
    margin-bottom: 25px;
    color: #222;
    font-weight: 600;
    border-bottom: 1px solid #eee;
    padding-bottom: 10px;
}

/* Grid layout */
.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
}

/* Full width fields */
.full-width {
    grid-column: span 2;
}

/* Labels */
label {
    font-size: 13px;
    font-weight: 600;
    color: #444;
    margin-bottom: 6px;
    display: block;
}

/* Inputs */
input,
select {
    width: 100%;
    padding: 10px 12px;
    border-radius: 6px;
    border: 1px solid #dcdfe3;
    font-size: 14px;
    transition: 0.2s;
    background: #fff;
}

input:focus,
select:focus {
    border-color: #2563eb;
    outline: none;
    box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.12);
}

/* File input */
input[type="file"] {
    padding: 8px;
}

/* Button */
button {
    margin-top: 25px;
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 7px;
    background: #2563eb;
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #1e4fd8;
}

/* Responsive */
@media (max-width: 768px) {
    .form-grid {
        grid-template-columns: 1fr;
    }

    .full-width {
        grid-column: span 1;
    }
}

</style>



</head>
<body>
    

    <div class="form-container">
    <form action="{% url 'employer' %}" method="post" enctype="multipart/form-data" class="employer-form">
        {% csrf_token %}

        <h2>Employer Registration</h2>

        <div class="form-grid">

            <div>
                <label>Company Name</label>
                <input type="text" name="company_name" required>
            </div>

            <div>
                <label>Company Size</label>
                <input type="text" name="company_size" required>
            </div>

            <div class="full-width">
                <label>Description</label>
                <input type="text" name="company_desc" required>
            </div>

            <div>
                <label>Location</label>
                <input type="text" name="company_loc" required>
            </div>

            <div>
                <label>Industry</label>
                <select name="industry">
                    <option>Technology / IT</option>
                    <option>Finance & Business</option>
                    <option>Healthcare & Medical</option>
                    <option>Engineering & Manufacturing</option>
                    <option>Sales & Marketing</option>
                    <option>Creative & Media</option>
                    <option>Hospitality & Tourism</option>
                    <option>Retail & E-commerce</option>
                    <option>Education & Training</option>
                    <option>Logistics & Transport</option>
                    <option>Legal & Government</option>
                    <option>Emerging / Trending</option>
                </select>
            </div>

            <div class="full-width">
                <label>Address</label>
                <input type="text" name="company_address" required>
            </div>

            <div>
                <label>Recruiter Name</label>
                <input type="text" name="recruiter_name" required>
            </div>

            <div>
                <label>Designation</label>
                <input type="text" name="recruiter_designation" required>
            </div>

            <div>
                <label>Email</label>
                <input type="email" name="recruiter_email" required>
            </div>

            <div>
                <label>Phone</label>
                <input type="text" name="recruiter_phone" required>
            </div>

            <div class="full-width">
                <label>Company Logo</label>
                <input type="file" name="comapny_logo" accept="image/*" required>
            </div>

        </div>

        <button type="submit">Register Employer</button>
    </form>
</div>


</body>
</html>
