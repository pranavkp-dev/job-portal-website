{% load static %} 

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
    * {
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, sans-serif;
    }

    body {
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    form {
        background: #ffffff;
        padding: 35px 30px;
        border-radius: 14px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    form div {
        margin-bottom: 18px;
    }

    label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 6px;
        color: #333;
    }

    input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #dcdcdc;
        font-size: 14px;
        transition: 0.2s ease;
    }

    input:focus {
        outline: none;
        border-color: #2a5298;
        box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.15);
    }

    button {
        width: 100%;
        padding: 11px;
        border: none;
        border-radius: 8px;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        color: white;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s ease;
    }

    button:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 18px rgba(30, 60, 114, 0.35);
    }

    button:active {
        transform: translateY(0);
    }
</style>
</head>
<body>
    <div>
       <form action="{% url 'applyform' job.id %}" method="post">
            {% csrf_token %}

            <div>
                <label>Name</label>
                <input type="text" name="applicantname" required>
            </div>

            <div>
                <label>Email Address</label>
                <input type="text" name="applicantemail" required>
            </div>

            <div>
                <label>Mobile Number</label>
                <input type="text" name="applicantnumber" required>
            </div>


         


            <div>
                <button type="submit">Apply</button>
            </div>



        </form>
    </div>
</body>
</html>
