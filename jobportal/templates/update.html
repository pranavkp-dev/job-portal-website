{% load static %} 

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>


    <style>
    * {
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, sans-serif;
    }

    body {
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    form {
        background: #ffffff;
        padding: 30px;
        border-radius: 14px;
        width: 100%;
        max-width: 650px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        animation: fadeIn 0.35s ease-in-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .update-table {
        width: 100%;
        border-collapse: collapse;
    }

    .update-table td {
        padding: 10px 8px;
        font-size: 14px;
        vertical-align: middle;
    }

    .update-table td:first-child {
        font-weight: 600;
        color: #333;
        width: 35%;
        white-space: nowrap;
    }

    input[type="text"],
    input[type="date"] {
        width: 100%;
        padding: 9px 11px;
        border-radius: 8px;
        border: 1px solid #dcdcdc;
        font-size: 14px;
        transition: 0.2s ease;
        background: #fafafa;
    }

    input:focus {
        outline: none;
        border-color: #2c5364;
        background: #ffffff;
        box-shadow: 0 0 0 3px rgba(44, 83, 100, 0.15);
    }

    .btn-row {
        padding-top: 18px;
    }

    input[type="submit"] {
        width: 100%;
        padding: 11px;
        border: none;
        border-radius: 9px;
        background: linear-gradient(135deg, #203a43, #2c5364);
        color: white;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s ease;
    }

    input[type="submit"]:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    }

    input[type="submit"]:active {
        transform: translateY(0);
    }

    /* Mobile Responsive */
    @media (max-width: 600px) {
        form {
            margin: 15px;
            padding: 20px;
        }

        .update-table td {
            display: block;
            width: 100%;
            padding: 6px 0;
        }

        .update-table td:first-child {
            margin-top: 12px;
        }
    }
</style>

</head>
<body>
    

    <div>


    <form action="{% url 'update' des.id %}" method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <table class="update-table">
                    <tr>
                        <td>Company Name</td>
                        <td><input type="text" name="company_name" value="{{ des.company_name }}"></td>
                    </tr>

                    <tr>
                        <td>Job Title</td>
                        <td><input type="text" name="job_title" value="{{ des.job_title }}"></td>
                    </tr>

                    <tr>
                        <td>Job Description</td>
                        <td><input type="text" name="job_desc" value="{{ des.job_desc }}"></td>
                    </tr>

                    <tr>
                        <td>Company Location</td>
                        <td><input type="text" name="company_loc" value="{{ des.company_loc }}"></td>
                    </tr>

                    <tr>
                        <td>Skills</td>
                        <td><input type="text" name="req_skills" value="{{ des.req_skills }}"></td>
                    </tr>

                    <tr>
                        <td>Job Type</td>
                        <td><input type="text" name="job_type" value="{{ des.job_type }}"></td>
                    </tr>


                    <tr>
                        <td>Work Mode</td>
                        <td><input type="text" name="work_mode" value="{{ des.work_mode }}"></td>
                    </tr>


                    <tr>
                        <td>Experience</td>
                        <td><input type="text" name="Exp_level" value="{{ des.Exp_level }}"></td>
                    </tr>

                    <tr>
                        <td>Education</td>
                        <td><input type="text" name="Education_req" value="{{ des.Education_req }}"></td>
                    </tr>


                    <tr>
                        <td>Salary Range</td>
                        <td><input type="text" name="salary_range" value="{{ des.salary_range }}"></td>
                    </tr>

                    <tr>
                        <td>Vacancies</td>
                        <td><input type="text" name="vacancies" value="{{ des.vacancies }}"></td>
                    </tr>


                    <tr>
                        <td>App DeadLine</td>
                        <td><input type="date" name="app_deadline" value="{{ des.app_deadline }}"></td>
                    </tr>


                    <tr>
                        <td>Joining time</td>
                        <td><input type="text" name="joining_time" value="{{ des.joining_time }}"></td>
                    </tr>

                    

                    <tr>
                        <td colspan="2" class="btn-row">
                            <input type="submit" value="Update">
                        </td>
                    </tr>
                </table>

                
            </form>

            </div>



</body>
</html>
